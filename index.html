<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Sumba Residence</title>
<style>
body{margin:0;font-family:Segoe UI,sans-serif;background:#f6f4ee;color:#222}
header{position:fixed;top:0;width:100%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:12px 30px;z-index:9}
.hero{height:100vh;background:linear-gradient(rgba(8,44,36,.65),rgba(8,44,36,.65)),url('assets/images/angle_1.jpg') center/cover;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff}
h1{font-size:4rem;margin:0}
.btn{background:#d6af45;color:#000;padding:14px 26px;border-radius:30px;text-decoration:none;font-weight:bold}
.sec{max-width:1200px;margin:auto;padding:80px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#fff;padding:24px;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
.gallery img,.site img{width:100%;border-radius:16px}
.logo{height:50px}
</style></head><body>
<header><img class='logo' src='assets/images/logo.png'></header>
<section class='hero'><div><h1>SUMBA RESIDENCE</h1><p>Cluster Eksklusif Pertama di Sumba</p><a class='btn'>KPR BRI • BNI • Mandiri • Bank NTT</a></div></section>
<section class='sec'><h2>Keunggulan</h2><div class='grid'>
<div class='card'>Desain Modern</div><div class='card'>One Gate System</div><div class='card'>Keamanan 24 Jam</div><div class='card'>Investasi Menjanjikan</div>
</div></section>
<section class='sec site'><h2>Siteplan</h2><img src='assets/images/siteplan.png'></section>
<section class='sec'><h2>Galeri</h2><div class='grid gallery'>
<img src='assets/images/angle_2.jpg'><img src='assets/images/angle_3.jpg'><img src='assets/images/angle_4.jpg'>
</div></section>
</body></html>
